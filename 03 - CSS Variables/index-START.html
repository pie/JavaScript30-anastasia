<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoped CSS Variables and JS</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>
  <h2>Update CSS Variables with <span class='hl'>JS</span></h2>

  <div class="controls">
    <label for="spacing">Spacing:</label>
    <input id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">

    <label for="blur">Blur:</label>
    <input id="blur" type="range" name="blur" min="0" max="25" value="10" data-sizing="px">

    <label for="base">Base Color</label>
    <input id="base" type="color" name="base" value="#ffc600">
  </div>

  <img src="image.jpg">

  <style>
    :root {
      --spacing: 10px;
      --blur: 10px;
      --base: #ffc600;
    }

    img {
      max-width: 60vw;
      padding: var(--spacing);
      background: var(--base);
      filter: blur(var(--blur));
    }

    .hl {
      color: var(--base);
    }

    /*
      misc styles, nothing to do with CSS variables
    */

    body {
      text-align: center;
      background: #193549;
      color: white;
      font-family: 'helvetica neue', sans-serif;
      font-weight: 100;
      font-size: 50px;
    }

    .controls {
      margin-bottom: 50px;
    }

    input {
      width: 100px;
    }
  </style>

  <script>
    // Select all the input elements on the page
    // This will give use a NodeList of all the inputs in the controls div
    const inputs = document.querySelectorAll('.controls input');

    /**
     * This function will be called whenever an input changes or is moved (for range inputs).
     * It will update the corresponding CSS variable on the root element (document.documentElement).
     * 
     * @returns {void}
     */
    function handleUpdate() {
      // Get the suffix for the value (e.g., 'px' for spacing and blur, '' for color).
      // The dataset property allows us to access data attributes on the element.
      // In this case, we are looking for the 'data-sizing' attribute.
      const suffix = this.dataset.sizing || '';

      // Update the CSS variable on the root element.
      // The name of the variable is derived from the input's name attribute.
      document.documentElement.style.setProperty(`--${this.name}`, this.value + suffix);
    }

    // Add event listeners to each input element.
    // We listen for both 'change' and 'mousemove' events to ensure that
    // the CSS variables are updated in real-time as the user interacts with the inputs.
    inputs.forEach( input => input.addEventListener('change', handleUpdate) );
    inputs.forEach( input => input.addEventListener('mousemove', handleUpdate) );
  </script>

</body>
</html>
