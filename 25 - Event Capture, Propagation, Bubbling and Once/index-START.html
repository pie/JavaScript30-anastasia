<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Understanding JavaScript's Capture</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body class="bod">

  <div class="one">
    <div class="two">
      <div class="three">
      </div>
    </div>
  </div>

<style>
  html {
    box-sizing: border-box;
  }

  *, *:before, *:after {
    box-sizing: inherit;
  }

  div {
    width: 100%;
    padding: 100px;
  }

  .one {
    background: thistle;
  }

  .two {
    background: mistyrose;
  }

  .three {
    background: coral;
  }
</style>

<button></button>
<script>
  // This code demonstrates event capture, propagation, bubbling
  // and the use of the 'once' option in event listeners.
  // It wouldn't necessarily be used in production, but serves to illustrate these concepts.

  // Select all divs
  const divs = document.querySelectorAll( 'div' );

  /**
   * Event handler function to log the class of the clicked div.
   * 
   * @param {Event} event - The event object
   * @returns {void}
   */
  function logText( event ) {
    // Log the class of the div whose listener is currently running.
    console.log( this.classList.value );

    // Stop the event from bubbling up to parent divs for this click.
    // With capture set to false, clicking the innermost div runs that
    // div's handler first, then stopPropagation() prevents parent handlers
    // from running for the same event.
    event.stopPropagation();
  }

  // Add a click event listener to each div.
  // With capture set to false, the listeners run during the bubbling phase.
  // Without stopPropagation(), clicking an inner div would also trigger
  // the handlers on its parent divs as the event bubbles upward.
  // With once set to true, each div's listener is removed after it runs once,
  // so each div can only be logged the first time its own handler executes.
  divs.forEach( div => div.addEventListener( 'click', logText, {
    capture: false,
    once: true
    } ) );
</script>
</body>
</html>
